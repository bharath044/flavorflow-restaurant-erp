# JVM Heap
org.gradle.jvmargs=-Xmx2048M -XX:MaxMetaspaceSize=512M -Dfile.encoding=UTF-8

# Enable AndroidX and Jetifier
android.useAndroidX=true
android.enableJetifier=true

# Speed up builds
org.gradle.parallel=true
org.gradle.caching=false
android.nonTransitiveRClass=true

# Suppress SDK warning
android.suppressUnsupportedCompileSdk=36

# Avoid file locking on Windows
org.gradle.daemon=false

# ===== FIX: Kotlin 2.1.0 daemon cache bug on Windows =====
# Disable incremental compilation (prevents "Storage already registered" error)
kotlin.incremental=false
# Run Kotlin compiler in-process (no separate daemon = no cache conflict)
kotlin.compiler.execution.strategy=in-process
